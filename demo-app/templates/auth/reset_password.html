{% extends "index.html" %}

{% block style %}
    {{ super() }}
    <link rel="stylesheet" href='{% static "css/inscription.css" %}'>
{% endblock %}

{% block content %}
<div class="container">
    <h1>{% if title %}{{ title }}{% endif %}</h1>

    {% block messages %}
        {% messages %}
    {% endblock %}

    <div class="form-container demo-form-panel">
        {% if reset_done %}
            <div class="alert alert-success">Password updated. <a href="/login">Sign in</a></div>
        {% else %}
            <form method="post" action="/reset-password/{{ token }}/{{ encrypted_email }}">
                {% form.reset_form %}
                <button type="submit" class="btn btn-primary btn-submit">Confirm new password</button>
            </form>
        {% endif %}
    </div>
</div>
{% endblock %}
