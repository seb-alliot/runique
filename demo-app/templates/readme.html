{% extends "index.html" %}

{% block meta %}
<meta name="description" content="{% if lang == 'fr' %}Runique — framework web Rust inspiré de Django. Présentation, installation et liens vers la documentation.{% else %}Runique — a Django-inspired Rust web framework. Overview, installation, and documentation links.{% endif %}">
<meta name="robots" content="index, follow">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Runique">
<meta property="og:title" content="{% if lang == 'fr' %}README — Runique{% else %}README — Runique{% endif %}">
<meta property="og:description" content="{% if lang == 'fr' %}Runique — framework web Rust inspiré de Django.{% else %}Runique — a Django-inspired Rust web framework.{% endif %}">
<meta property="og:url" content="https://runique-production.up.railway.app/readme/{{ lang }}">
<meta property="og:image" content="https://runique-production.up.railway.app/media/toshiro.avif">
<link rel="canonical" href="https://runique-production.up.railway.app/readme/{{ lang }}">
{% endblock %}

{% block style %}
    {{ super() }}
    <link rel="stylesheet" href='{% static "css/doc.css" %}'>
    <link rel="stylesheet" href='{% static "css/highlight-github-dark.min.css" %}'>
{% endblock %}

{% block header %}{% endblock %}

{% block content %}
<div class="readme-bar">
    <span class="readme-bar-title">README</span>
    <div class="readme-lang-switch">
        <a href="/readme/fr" class="btn {% if lang == 'fr' %}btn-primary{% else %}btn-secondary{% endif %}">Français</a>
        <a href="/readme/en" class="btn {% if lang == 'en' %}btn-primary{% else %}btn-secondary{% endif %}">English</a>
    </div>
</div>
<div class="readme-container doc-block-content">
    {{ content | markdown }}
</div>
{% endblock %}

{% block scripts %}
<script nonce="{{ csp_nonce }}" src='{% static "js/highlight.min.js" %}'></script>
<script nonce="{{ csp_nonce }}">hljs.highlightAll();</script>
{% endblock %}
