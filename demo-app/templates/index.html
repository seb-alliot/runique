<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if title %}{{ title }}{% endif %}</title>
    {% block style %}
        <link rel="stylesheet" href='{% static "css/variables.css" %}'>
        <link rel="stylesheet" href='{% static "css/main.css" %}'>
    {% endblock %}
    <link rel="icon" type="image/png" href='{% if media %}{% media "favicon/favicon.ico" %}{% endif %}'>
</head>
<body>

    {% if debug %}
        <div class="debug-banner">
            <strong>Debug Mode Activé</strong>
        </div>
    {% endif %}


    {% block header %}
        <header>
            <img src='{% media "toshiro.avif" %}' alt="Logo">
        </header>
    {% endblock %}

    <main>
        {% block content %}
            {% include "utils/index_content.html" %}
        {% endblock %}
    </main>
    <footer>
        {% block footer %}
            {% include "utils/footer.html" %}
        {% endblock %}
    </footer>
</body>
