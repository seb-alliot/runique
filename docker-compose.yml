services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: runique
      POSTGRES_PASSWORD: runique_test
      POSTGRES_DB: runique_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U runique -d runique_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_USER: runique
      MARIADB_PASSWORD: runique_test
      MARIADB_DATABASE: runique_test
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
