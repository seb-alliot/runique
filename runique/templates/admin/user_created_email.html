<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>{{ t_btn }}</title>
</head>
<body style="font-family: sans-serif; color: #333; max-width: 600px; margin: 0 auto; padding: 24px;">
  <h2>{{ t_greeting }} {{ username }}</h2>
  <p>{{ t_body }}</p>
  <p>
    <a href="{{ reset_url }}" style="display:inline-block;padding:12px 24px;background:#3b82f6;color:#fff;border-radius:6px;text-decoration:none;">
      {{ t_btn }}
    </a>
  </p>
  <p style="color:#888;font-size:0.85em;">{{ t_validity }}</p>
  <hr style="border:none;border-top:1px solid #eee;margin:24px 0;">
  <p style="color:#aaa;font-size:0.8em;">{{ email }}</p>
</body>
</html>
