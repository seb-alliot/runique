<!-- Environment information -->
<div class="section">
  <h2>{{ debug_environment }}</h2>
    <div class="info-grid">
      <div class="info-card">
        <div class="label">
          {{ debug_debug_mode }}
        </div>
        <div class="value">
          {% if environment.debug_mode %}
            <span class="badge badge-warning">On</span>
          {% else %}
            <span class="badge badge-success">Off</span>
          {% endif %}
        </div>
      </div>
      <div class="info-card">
        <div class="label">
          {{ debug_rust_version }}
        </div>
        <div class="value">
          {{ environment.rust_version }}
        </div>
      </div>
      <div class="info-card">
        <div class="label">
          {{ debug_app_version }}
        </div>
          <div class="value">
            {{ environment.app_version }}
          </div>
        </div>
        <div class="info-card">
          <div class="label">
            {{ debug_status_code }}
          </div>
          <div class="value">
            <span class="badge badge-error">{{ status_code }}</span>
          </div>  
        </div>
      </div>
</div>
