<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if title %}{{ title }}{% else %}Réinitialiser le mot de passe{% endif %}</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.12); padding: 2rem; width: 100%; max-width: 420px; }
        h1 { margin-top: 0; font-size: 1.5rem; }
        .alert { padding: .75rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
        .alert-success { background: #d1fae5; color: #065f46; }
        .alert-error   { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
<div class="card">
    <h1>{% if title %}{{ title }}{% else %}Réinitialiser le mot de passe{% endif %}</h1>

    {% messages %}

    <form method="post">
        {% csrf %}
        {% form.forgot_form %}
        <button type="submit" style="margin-top:1rem;padding:.5rem 1.25rem;background:#3b82f6;color:#fff;border:none;border-radius:4px;cursor:pointer;">
            Envoyer le lien
        </button>
    </form>
</div>
</body>
</html>
